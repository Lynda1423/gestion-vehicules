syntax = "proto3";

package gps;

import "google/protobuf/timestamp.proto";

// Service de tracking GPS en temps réel
service GPSTracking {
  // Envoi d'un flux de positions (Client Streaming)
  rpc StreamPositions (stream PositionRequest) returns (StreamResponse);
}

// Détails de la position GPS envoyée
message PositionRequest {
  string vehicule_id = 1;
  double latitude = 2;
  double longitude = 3;
  double vitesse = 4;    // en km/h
  double direction = 5;  // cap en degrés (0-360)
  google.protobuf.Timestamp horodatage = 6;
  double altitude = 7;
}

// Réponse du serveur à la fin du flux
message StreamResponse {
  int32 nombre_points_recus = 1;
  string message = 2;
  bool succes = 3;
}
