# ─────────────────────────────────────────────────
# Deployment service-vehicules
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-vehicules
  namespace: sgfv
  labels:
    app: service-vehicules
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-vehicules
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
      labels:
        app: service-vehicules
    spec:
      containers:
        - name: service-vehicules
          image: gestion_vehicules-service-vehicules:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: config-vehicules
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: password
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://localhost:8180/realms/sgfv"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak:8080/realms/sgfv/protocol/openid-connect/certs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # startupProbe : laisse Spring Boot démarrer tranquillement (max 30x10s = 300s)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 30
          # livenessProbe : redémarre si le service plante après démarrage
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 30
          # readinessProbe : retire du load balancer si pas prêt
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            failureThreshold: 20
            timeoutSeconds: 30

