# ─────────────────────────────────────────────────
# Deployment service-vehicules
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-vehicules
  namespace: sgfv
  labels:
    app: service-vehicules
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-vehicules
  template:
    metadata:
      labels:
        app: service-vehicules
    spec:
      containers:
        - name: service-vehicules
          image: gestion_vehicules-service-vehicules:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: config-vehicules
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # startupProbe : laisse Spring Boot démarrer tranquillement (max 200x10s = 2000s)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 200
          # livenessProbe : redémarre si le service plante après démarrage
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 10
          # readinessProbe : retire du load balancer si pas prêt
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            failureThreshold: 20
            timeoutSeconds: 10

