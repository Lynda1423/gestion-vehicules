# ─────────────────────────────────────────────────
# Deployment service-localisation
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-localisation
  namespace: sgfv
  labels:
    app: service-localisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-localisation
  template:
    metadata:
      labels:
        app: service-localisation
    spec:
      containers:
        - name: service-localisation
          image: gestion_vehicules-service-localisation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: config-localisation
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5

