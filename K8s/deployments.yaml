# ─────────────────────────────────────────────────
# Deployment service-localisation
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-localisation
  namespace: sgfv
  labels:
    app: service-localisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-localisation
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8084"
      labels:
        app: service-localisation
    spec:
      containers:
        - name: service-localisation
          image: gestion_vehicules-service-localisation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: config-localisation
          env:
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-localisation-credentials
                  key: PATRONI_SUPERUSER_PASSWORD
            - name: DB_HOST
              value: "postgres-localisation"
            - name: DB_NAME
              value: "postgres"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_SERVICE_NAME
              value: "service-localisation"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5

---
# ─────────────────────────────────────────────────
# Deployment service-alertes
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-alertes
  namespace: sgfv
  labels:
    app: service-alertes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-alertes
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
      labels:
        app: service-alertes
    spec:
      containers:
        - name: service-alertes
          image: gestion_vehicules-service-alertes:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: config-alertes
          env:
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - name: code-vol
              mountPath: /app/src/app.js
              subPath: app.js
          startupProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
      volumes:
        - name: code-vol
          configMap:
            name: alertes-code

---
# ─────────────────────────────────────────────────
# Deployment api-gateway (GraphQL)
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sgfv
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "4000"
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gestion_vehicules-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: SERVICE_VEHICULES_URL
              value: "http://service-vehicules:8081"
            - name: SERVICE_CONDUCTEURS_URL
              value: "http://service-conducteurs:8082"
            - name: SERVICE_MAINTENANCE_URL
              value: "http://service-maintenance:8083"
            - name: SERVICE_LOCALISATION_URL
              value: "http://service-localisation:8084"
            - name: SERVICE_ALERTES_URL
              value: "http://service-alertes:3002"
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_REALM
              value: "sgfv"
            - name: KEYCLOAK_JWKS_URI
              value: "http://keycloak:8080/realms/sgfv/protocol/openid-connect/certs"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_SERVICE_NAME
              value: "api-gateway"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - name: schema-vol
              mountPath: /app/graphQL/schema.graphql
              subPath: schema.graphql
          startupProbe:
            httpGet:
              path: /.well-known/apollo/server-health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /.well-known/apollo/server-health
              port: 4000
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /.well-known/apollo/server-health
              port: 4000
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: schema-vol
          configMap:
            name: gateway-schema