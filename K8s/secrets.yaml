# ─────────────────────────────────────────────────
# Secrets BDD — communs à tous les services
# sgfv        → c2dmdg==
# sgfv_secret → c2dmdl9zZWNyZXQ=
# ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: secret-db
  namespace: sgfv
type: Opaque
data:
  username: c2dmdg==
  password: c2dmdl9zZWNyZXQ=

---
# ─────────────────────────────────────────────────
# Secret Keycloak admin
# admin    → YWRtaW4=
# admin123 → YWRtaW4xMjM=
# ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: secret-keycloak
  namespace: sgfv
type: Opaque
data:
  admin-user: YWRtaW4=
  admin-password: YWRtaW4xMjM=