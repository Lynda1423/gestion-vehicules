apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: sgfv
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.95.0
          args:
            - "--config=/etc/otel-collector-config/relay.yaml"
          ports:
            - containerPort: 4317 # OTLP gRPC
            - containerPort: 4318 # OTLP HTTP
            - containerPort: 8888 # Metrics
          volumeMounts:
            - name: config-volume
              mountPath: /etc/otel-collector-config
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config-volume
          configMap:
            name: otel-collector-fixed-config
            items:
              - key: relay.yaml
                path: relay.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: sgfv
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
  type: ClusterIP
