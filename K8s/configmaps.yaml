# ─────────────────────────────────────────────────
# ConfigMap service-vehicules
# ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-vehicules
  namespace: sgfv
data:
  SERVER_PORT: "8081"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-vehicules-postgresql:5432/vehicules_db"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KEYCLOAK_AUTH_SERVER_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "sgfv"
  KEYCLOAK_RESOURCE: "sgfv-backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "service-vehicules"

---
