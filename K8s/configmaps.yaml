# ─────────────────────────────────────────────────
# ConfigMap service-localisation
# ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-localisation
  namespace: sgfv
data:
  PORT: "8084"
  GRPC_PORT: "3001"
  DATABASE_URL: "postgresql://sgfv:sgfv_secret@postgres-localisation-postgresql:5432/localisation_db"
  KAFKA_BROKERS: "kafka:9092"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "sgfv"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "service-localisation"
  GPS_RECORD_INTERVAL_SECONDS: "10"
  VITESSE_EXCESSIVE_SEUIL: "130"

---
