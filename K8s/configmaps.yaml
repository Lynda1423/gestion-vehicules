# ─────────────────────────────────────────────────
# ConfigMap gateway-schema (Généré par Antigravity)
# ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-schema
  namespace: sgfv
data:
  schema.graphql: |
    # ───────────────────────────────────────────────────────────
    # ENUMS
    # ───────────────────────────────────────────────────────────
    
    enum StatutVehicule {
      DISPONIBLE
      EN_MISSION
      EN_MAINTENANCE
      EN_PANNE
      HORS_SERVICE
    }
    
    enum StatutCompte {
      ACTIF
      INACTIF
      SUSPENDU
    }
    
    enum DisponibiliteConducteur {
      DISPONIBLE
      EN_MISSION
    }
    
    enum DisponibiliteTechnicien {
      DISPONIBLE
      OCCUPE
    }
    
    enum StatutMaintenance {
      SIGNALEE
      PLANIFIEE
      EN_COURS
      TERMINEE
      ANNULEE
    }
    
    enum TypeZone {
      AUTORISEE
      INTERDITE
    }
    
    enum NiveauAlerte {
      INFO
      AVERTISSEMENT
      CRITIQUE
      URGENCE
    }
    
    enum TypeEvenementAlerte {
      VEHICULE_ASSIGNE
      REVISION_PLANIFIEE
      PERMIS_EXPIRE
      SEUIL_KM_ATTEINT
      MAINTENANCE_DEBUTEE
      MAINTENANCE_TERMINEE
      PANNE_SIGNALEE
      SORTIE_ZONE
      VITESSE_EXCESSIVE
      VEHICULE_CREE
      MAINTENANCE_ANNULEE
    }
    
    enum RoleDestinataire {
      CONDUCTEUR
      TECHNICIEN
      ADMIN
    }
    
    # ───────────────────────────────────────────────────────────
    # TYPES — service-vehicules
    # ───────────────────────────────────────────────────────────
    
    type Vehicule {
      id: ID!
      plaque: String!
      marque: String!
      modele: String!
      annee: Int!
      kilometrage: Int!
      statut: StatutVehicule!
      conducteurAssigneId: ID
      conducteurAssigne: Conducteur
      dateAjout: String!
      dateModification: String!
    }
    
    # ───────────────────────────────────────────────────────────
    # TYPES — service-conducteurs
    # ───────────────────────────────────────────────────────────
    
    type Conducteur {
      id: ID!
      prenom: String!
      nom: String!
      email: String!
      telephone: String
      numeroPermis: String!
      dateExpirationPermis: String!
      vehiculeAssigneId: ID
      statutCompte: StatutCompte!
      disponibilite: DisponibiliteConducteur!
      vehiculeAssigne: Vehicule
      dateCreation: String!
      keycloakId: String
    }
    
    # ───────────────────────────────────────────────────────────
    # TYPES — service-maintenance
    # ───────────────────────────────────────────────────────────
    
    type Maintenance {
      id: ID!
      vehiculeId: ID!
      typeIntervention: String!
      description: String
      statut: StatutMaintenance!
      technicienId: ID
      dateCreation: String!
      datePlanifiee: String
      dateDemarrage: String
      dateCloture: String
      cout: Float
      compteRendu: String
    }
    
    type Technicien {
      id: ID!
      keycloakId: String
      prenom: String!
      nom: String!
      email: String!
      telephone: String
      disponibilite: DisponibiliteTechnicien!
    }
    
    # ───────────────────────────────────────────────────────────
    # TYPES — service-localisation
    # ───────────────────────────────────────────────────────────
    
    type Position {
      vehiculeId: ID
      latitude: Float!
      longitude: Float!
      vitesse: Float!
      direction: Float!
      horodatage: String!
    }
    
    type Zone {
      id: ID!
      nom: String!
      type: TypeZone!
      latitudeCentre: Float!
      longitudeCentre: Float!
      rayonMetres: Int!
      active: Boolean!
      dateCreation: String!
    }
    
    # ───────────────────────────────────────────────────────────
    # TYPES — service-alertes
    # ───────────────────────────────────────────────────────────
    
    type Alerte {
      id: ID!
      typeEvenement: TypeEvenementAlerte!
      niveau: NiveauAlerte!
      roleDestinataire: RoleDestinataire!
      vehiculeId: ID
      utilisateurId: String
      message: String!
      estLu: Boolean!
      dateLecture: String
      dateCreation: String!
      plaque: String
    }
    
    # ───────────────────────────────────────────────────────────
    # QUERIES
    # ───────────────────────────────────────────────────────────
    
    type Query {
    
      # service-vehicules
      vehicules(statut: StatutVehicule, marque: String): [Vehicule!]!
      vehicule(id: ID!): Vehicule
    
      # service-conducteurs
      conducteurs(statutCompte: StatutCompte, disponibilite: DisponibiliteConducteur): [Conducteur!]!
      conducteur(id: ID!): Conducteur
      monProfil: Conducteur
    
      # service-maintenance
      maintenances(statut: StatutMaintenance, vehiculeId: ID): [Maintenance!]!
      maintenance(id: ID!): Maintenance
      historiqueMaintenance(vehiculeId: ID!): [Maintenance!]!
      techniciens: [Technicien!]!
      technicien(id: ID!): Technicien
    
      # service-localisation
      positionsActuelles: [Position!]!
      dernierePosition(vehiculeId: ID!): Position
      trajetVehicule(vehiculeId: ID!, debut: String, fin: String): [Position!]!
      zones: [Zone!]!
      zone(id: ID!): Zone
    
      # service-alertes
      alertes(niveau: NiveauAlerte, estLu: Boolean, typeEvenement: TypeEvenementAlerte, role: RoleDestinataire): [Alerte!]!
      alerte(id: ID!): Alerte
      mesAlertes: [Alerte!]!
    }
    
    # ───────────────────────────────────────────────────────────
    # MUTATIONS
    # ───────────────────────────────────────────────────────────
    
    type Mutation {
    
      # service-vehicules
      creerVehicule(plaque: String!, marque: String!, modele: String!, annee: Int!, kilometrage: Int): Vehicule!
      modifierVehicule(id: ID!, marque: String, modele: String, annee: Int, kilometrage: Int): Vehicule!
      changerStatutVehicule(id: ID!, statut: StatutVehicule!): Vehicule!
      assignerConducteur(vehiculeId: ID!, conducteurId: ID!): Vehicule!
      archiverVehicule(id: ID!): Vehicule!
    
      # service-conducteurs
      creerConducteur(keycloakId: String, prenom: String!, nom: String!, email: String!, telephone: String, numeroPermis: String!, dateExpirationPermis: String!): Conducteur!
      modifierConducteur(id: ID!, prenom: String, nom: String, email: String, telephone: String, numeroPermis: String, dateExpirationPermis: String, statutCompte: StatutCompte): Conducteur!
      changerStatutConducteur(id: ID!, statutCompte: StatutCompte!): Conducteur!
      changerDisponibiliteConducteur(id: ID!, disponibilite: DisponibiliteConducteur!): Conducteur!
      desactiverConducteur(id: ID!): Conducteur!
      supprimerConducteur(id: ID!): Boolean!
    
      # service-maintenance
      signalerMaintenance(vehiculeId: ID!, typeIntervention: String!, description: String): Maintenance!
