groups:
  - name: sgfv_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Error Rate on {{ $labels.application }}"
          description: "Service {{ $labels.application }} has an error rate > 5% over the last 5 minutes."

      - alert: SlowResponses
        expr: http_server_requests_seconds_sum / http_server_requests_seconds_count > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow Responses on {{ $labels.application }}"
          description: "Service {{ $labels.application }} average response time is > 1s."
