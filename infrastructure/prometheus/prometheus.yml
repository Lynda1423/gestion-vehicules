
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'service-vehicules'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sgfv-vehicules:8081']

  - job_name: 'service-conducteurs'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sgfv-conducteurs:8082']

  - job_name: 'service-maintenance'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sgfv-maintenance:8083']
