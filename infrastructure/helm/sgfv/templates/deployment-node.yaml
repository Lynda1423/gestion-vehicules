{{- range $name := (list "localisation" "alertes" "gateway") }}
{{- $config := index $.Values.services $name }}
{{- if $config.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ if eq $name "gateway" }}api-gateway{{ else }}service-{{ $name }}{{ end }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ if eq $name "gateway" }}api-gateway{{ else }}service-{{ $name }}{{ end }}
spec:
  replicas: {{ $config.replicas }}
  selector:
    matchLabels:
      app: {{ if eq $name "gateway" }}api-gateway{{ else }}service-{{ $name }}{{ end }}
  template:
    metadata:
      labels:
        app: {{ if eq $name "gateway" }}api-gateway{{ else }}service-{{ $name }}{{ end }}
    spec:
      containers:
        - name: {{ if eq $name "gateway" }}api-gateway{{ else }}service-{{ $name }}{{ end }}
          image: "{{ $config.image }}:{{ $config.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $config.port }}
            {{- if eq $name "localisation" }}
            - containerPort: 3001
            {{- end }}
          {{- if ne $name "gateway" }}
          envFrom:
            - configMapRef:
                name: config-{{ $name }}
          {{- end }}
          env:
            {{- if eq $name "localisation" }}
            - name: DATABASE_URL
              value: "postgresql://sgfv:sgfv_secret@postgres-localisation:5432/localisation_db?sslmode=no-verify"
            {{- end }}
            {{- if eq $name "gateway" }}
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: SERVICE_VEHICULES_URL
              value: "http://service-vehicules:8081"
            - name: SERVICE_CONDUCTEURS_URL
              value: "http://service-conducteurs:8082"
            - name: SERVICE_MAINTENANCE_URL
              value: "http://service-maintenance:8083"
            - name: SERVICE_LOCALISATION_URL
              value: "http://service-localisation:8084"
            - name: SERVICE_ALERTES_URL
              value: "http://service-alertes:3002"
            - name: KEYCLOAK_URL
              value: "{{ $.Values.global.keycloak.url }}"
            - name: KEYCLOAK_REALM
              value: "{{ $.Values.global.keycloak.realm }}"
            - name: KEYCLOAK_JWKS_URI
              value: "{{ $.Values.global.keycloak.url }}/realms/{{ $.Values.global.keycloak.realm }}/protocol/openid-connect/certs"
            {{- end }}
          resources:
            {{- toYaml $config.resources | nindent 12 }}
          {{- if eq $name "gateway" }}
          volumeMounts:
            - name: schema-vol
              mountPath: /app/graphQL/schema.graphql
              subPath: schema.graphql
          {{- end }}
          {{- if eq $name "alertes" }}
          volumeMounts:
            - name: code-vol
              mountPath: /app/src/app.js
              subPath: app.js
          {{- end }}
          startupProbe:
            httpGet:
              path: {{ if eq $name "gateway" }}/.well-known/apollo/server-health{{ else }}/health{{ end }}
              port: {{ $config.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: {{ if eq $name "gateway" }}/.well-known/apollo/server-health{{ else }}/health{{ end }}
              port: {{ $config.port }}
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ if eq $name "gateway" }}/.well-known/apollo/server-health{{ else }}/health{{ end }}
              port: {{ $config.port }}
            periodSeconds: 10
      {{- if eq $name "gateway" }}
      volumes:
        - name: schema-vol
          configMap:
            name: gateway-schema
      {{- end }}
      {{- if eq $name "alertes" }}
      volumes:
        - name: code-vol
          configMap:
            name: alertes-code
      {{- end }}
{{- end }}
{{- end }}
