{{- range $name, $config := .Values.services }}
{{- if $config.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: service-{{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    app: service-{{ $name }}
  ports:
    - port: {{ $config.port }}
      targetPort: {{ $config.port }}
      {{- if eq $name "localisation" }}
      name: rest
    - port: 3001
      targetPort: 3001
      name: grpc
      {{- end }}
  type: ClusterIP
{{- end }}
{{- end }}
