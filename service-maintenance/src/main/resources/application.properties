# ═══════════════════════════════════════════════════
# Configuration — service-maintenance
# Toutes les valeurs sont injectées via variables
# d'environnement (docker-compose / Kubernetes)
# La valeur après le : est le défaut pour le dev local
# ═══════════════════════════════════════════════════

# Serveur
server.port=${SERVER_PORT:8083}
spring.application.name=service-maintenance

# ── Base de données ──────────────────────────────
# CORRECTION : localhost:5434 → variable d'env (5434 en local, nom conteneur en Docker)
# CORRECTION : fleet_user/fleet_secret → sgfv/sgfv_secret
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/maintenance_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sgfv}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sgfv_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway — migrations SQL automatiques ─────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:migrations
spring.flyway.baseline-on-migrate=true

# ── Kafka ─────────────────────────────────────────
# CORRECTION : valeur fixe → variable d'environnement
# CORRECTION : StringSerializer → JsonSerializer pour les événements métier
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consommateur — écoute les topics vehicules et utilisateurs
spring.kafka.consumer.group-id=service-maintenance
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map

# Topics Kafka (correspondant à l'AsyncAPI)
kafka.topics.maintenance-signaled=maintenance
kafka.topics.maintenance-planned=maintenance
kafka.topics.maintenance-started=maintenance
kafka.topics.maintenance-completed=maintenance
kafka.topics.maintenance-cancelled=maintenance
kafka.topics.vehicules-consumed=vehicules
kafka.topics.utilisateurs-consumed=utilisateurs

# ── Sécurité Keycloak (JWT) ───────────────────────
# CORRECTION : port 8080 fixe → variable d'env + port 8180 par défaut
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:sgfv}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:sgfv}/protocol/openid-connect/certs

# ── Actuator — health + métriques Prometheus ─────
# AJOUT : prometheus exposé pour Grafana
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=service-maintenance

# ── OpenTelemetry — traces vers Jaeger ───────────
management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.service.name=${OTEL_SERVICE_NAME:service-maintenance}

# ── Logs ─────────────────────────────────────────
logging.level.fr.sgfv=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
# Kafka — ne pas bloquer le démarrage
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.consumer.properties.default.api.timeout.ms=5000
spring.kafka.listener.missing-topics-fatal=false