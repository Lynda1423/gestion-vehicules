name: SGFV — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sgfv

jobs:

  # ─────────────────────────────────────────────────
  # JOB 1 — Tests unitaires Spring Boot
  # ─────────────────────────────────────────────────
  test-spring:
    name: Tests Spring Boot
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [service-vehicules, service-conducteurs, service-maintenance]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Lancer les tests
        working-directory: ./${{ matrix.service }}
        run: mvn test -q

  # ─────────────────────────────────────────────────
  # JOB 2 — Tests unitaires Node.js
  # CORRECTION : suppression du cache npm (pas de package-lock.json)
  # ─────────────────────────────────────────────────
  test-node:
    name: Tests Node.js
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [service-localisation, service-alertes]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # CORRECTION : pas de cache car pas de package-lock.json

      - name: Installer les dépendances
        working-directory: ./${{ matrix.service }}
        run: npm install

      - name: Lancer les tests
        working-directory: ./${{ matrix.service }}
        run: npm test --if-present

  # ─────────────────────────────────────────────────
  # JOB 3 — Build et push des images Docker
  # ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test-spring, test-node]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - service-vehicules
          - service-conducteurs
          - service-maintenance
          - service-localisation
          - service-alertes

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push l'image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # JOB 4 — Notification du résultat
  # ─────────────────────────────────────────────────
  notify:
    name: Résultat du pipeline
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()

    steps:
      - name: Succès
        if: needs.build-and-push.result == 'success'
        run: echo "Pipeline réussi — toutes les images sont publiées sur ghcr.io"

      - name: Échec
        if: needs.build-and-push.result == 'failure'
        run: echo "Pipeline échoué — vérifiez les logs ci-dessus" && exit 1