# ═══════════════════════════════════════════════════
# Configuration — service-conducteurs
# Toutes les valeurs sont injectées via variables
# d'environnement (docker-compose / Kubernetes)
# La valeur après le : est le défaut pour le dev local
# ═══════════════════════════════════════════════════

# Serveur
server.port=${SERVER_PORT:8082}
spring.application.name=service-conducteurs

# ── Base de données ──────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/conducteurs_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sgfv}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sgfv_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway — migrations SQL automatiques ─────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:migrations
spring.flyway.baseline-on-migrate=true

# ── Kafka — Producteur ────────────────────────────
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.properties.max.block.ms=5000

# ── Kafka — Consommateur (topic vehicules) ────────
spring.kafka.consumer.group-id=service-conducteurs
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.default.api.timeout.ms=5000
spring.kafka.listener.missing-topics-fatal=false

# Topics Kafka (correspondant à l'AsyncAPI)
kafka.topics.conducteur-created=conducteurs
kafka.topics.conducteur-assigned=conducteurs
kafka.topics.conducteur-unassigned=conducteurs
kafka.topics.conducteur-deactivated=conducteurs
kafka.topics.conducteur-permis-expiration=conducteurs
kafka.topics.vehicules-consumed=vehicules

# ── Sécurité Keycloak (JWT) ───────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:sgfv}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:sgfv}/protocol/openid-connect/certs

# ── Actuator — health + métriques Prometheus ─────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=service-conducteurs

# ── OpenTelemetry — traces vers OTel Collector ───
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# ── Logs ─────────────────────────────────────────
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.fr.sgfv=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# ── GraphQL ───────────────────────────────────────
spring.graphql.graphiql.enabled=true
spring.graphql.path=/graphql
